<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b0f"/>
      <stop offset="100%" style="stop-color:#0f0e16"/>
    </linearGradient>
    <linearGradient id="goldTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0A030"/>
      <stop offset="30%" style="stop-color:#F0D060"/>
      <stop offset="50%" style="stop-color:#fff8dc"/>
      <stop offset="70%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.55"/>
      <stop offset="50%" style="stop-color:#F0D060;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.55"/>
    </linearGradient>
    <!-- Vertical divider gradient -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#D4AF37;stop-opacity:0.35"/>
      <stop offset="70%" style="stop-color:#D4AF37;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </linearGradient>
    <!-- Right side vignette to blend trophy edges -->
    <radialGradient id="trophyVignette" cx="75%" cy="50%" r="35%">
      <stop offset="60%" style="stop-color:#0b0b0f;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0b0b0f;stop-opacity:0.85"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <rect width="1200" height="630" fill="url(#leftGlow)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03" stroke="#D4AF37" stroke-width="1">
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Card border -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="url(#cardBg)" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Vertical gold divider between text and trophy -->
  <line x1="600" y1="40" x2="600" y2="590" stroke="url(#divider)" stroke-width="1"/>

  <!-- === LEFT SIDE: Text === -->

  <!-- Eyebrow label -->
  <text x="300" y="155"
    font-family="Arial, sans-serif"
    font-size="15"
    font-weight="700"
    text-anchor="middle"
    fill="#D4AF37"
    letter-spacing="6"
    opacity="0.55">FIFA WORLD CUP 2026</text>

  <!-- Main title line 1 -->
  <text x="300" y="248"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="88"
    font-weight="900"
    text-anchor="middle"
    fill="url(#goldTitle)"
    letter-spacing="4">ROAD</text>

  <!-- Main title line 2 -->
  <text x="300" y="334"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="88"
    font-weight="900"
    text-anchor="middle"
    fill="url(#goldTitle)"
    letter-spacing="4">TO</text>

  <!-- Main title line 3 -->
  <text x="300" y="420"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="88"
    font-weight="900"
    text-anchor="middle"
    fill="url(#goldTitle)"
    letter-spacing="4">GLORY</text>

  <!-- Gold rule line -->
  <line x1="100" y1="448" x2="500" y2="448" stroke="#D4AF37" stroke-width="1" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="300" y="486"
    font-family="Arial, sans-serif"
    font-size="17"
    font-weight="700"
    text-anchor="middle"
    fill="#D4AF37"
    letter-spacing="4"
    opacity="0.55">PREDICTION BRACKET</text>

  <!-- Tagline -->
  <text x="300" y="522"
    font-family="Arial, sans-serif"
    font-size="14"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.25)"
    letter-spacing="2">Build your bracket · Share your glory</text>

  <!-- Corner accents -->
  <path d="M 40 64 L 40 40 L 64 40" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 1160 64 L 1160 40 L 1136 40" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 40 566 L 40 590 L 64 590" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M 1160 566 L 1160 590 L 1136 590" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- PLACEHOLDER RECT where trophy image will be composited by ImageMagick -->
  <!-- Right half: x=600 to 1200 (600px wide), y=0 to 630 (630px tall) -->
  <!-- Trophy will be placed here by the build script -->
</svg>
