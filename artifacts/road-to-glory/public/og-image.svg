<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Deep dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b0f"/>
      <stop offset="100%" style="stop-color:#0f0e16"/>
    </linearGradient>
    <!-- Gold shimmer gradient for title -->
    <linearGradient id="goldTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0A030"/>
      <stop offset="30%" style="stop-color:#F0D060"/>
      <stop offset="50%" style="stop-color:#fff8dc"/>
      <stop offset="70%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <!-- Gold glow radial -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.18"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    <!-- Card background -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.03"/>
    </linearGradient>
    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#F0D060;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0.6"/>
    </linearGradient>
    <!-- Trophy body gradient -->
    <linearGradient id="trophyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#A07820"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <rect width="1200" height="630" fill="url(#topGlow)"/>
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.035" stroke="#D4AF37" stroke-width="1">
    <!-- Vertical lines every 60px -->
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <!-- Horizontal lines every 60px -->
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Center content card -->
  <rect x="120" y="80" width="960" height="470" rx="24" fill="url(#cardBg)" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Inner glow on card -->
  <radialGradient id="innerGlow" cx="50%" cy="30%" r="50%">
    <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
  </radialGradient>
  <rect x="120" y="80" width="960" height="470" rx="24" fill="url(#innerGlow)"/>

  <!-- Trophy SVG shape (simplified silhouette) -->
  <!-- Cup body -->
  <g transform="translate(540, 118)" opacity="0.95">
    <!-- Glow behind trophy -->
    <ellipse cx="60" cy="130" rx="70" ry="70" fill="#D4AF37" opacity="0.08"/>
    <ellipse cx="60" cy="100" rx="50" ry="50" fill="#D4AF37" opacity="0.06"/>

    <!-- Trophy cup top (globe shape) -->
    <ellipse cx="60" cy="42" rx="42" ry="42" fill="url(#trophyGold)" opacity="0.9"/>
    <ellipse cx="60" cy="42" rx="38" ry="38" fill="#F0D060" opacity="0.25"/>
    <!-- Continents suggestion on globe -->
    <path d="M 35 28 Q 50 22 65 30 Q 72 38 60 44 Q 48 40 38 36 Z" fill="#C09828" opacity="0.4"/>
    <path d="M 68 48 Q 78 44 82 55 Q 76 62 68 58 Z" fill="#C09828" opacity="0.3"/>

    <!-- Cup handles (left) -->
    <path d="M 18 50 Q 2 55 4 70 Q 6 82 20 80 L 20 70 Q 10 72 10 65 Q 10 58 18 58 Z" fill="url(#trophyGold)" opacity="0.85"/>
    <!-- Cup handles (right) -->
    <path d="M 102 50 Q 118 55 116 70 Q 114 82 100 80 L 100 70 Q 110 72 110 65 Q 110 58 102 58 Z" fill="url(#trophyGold)" opacity="0.85"/>

    <!-- Neck / stem -->
    <rect x="48" y="84" width="24" height="42" rx="4" fill="url(#trophyGold)" opacity="0.9"/>
    <!-- Stem detail lines -->
    <rect x="51" y="90" width="18" height="2" rx="1" fill="#F0D060" opacity="0.4"/>
    <rect x="51" y="96" width="18" height="2" rx="1" fill="#F0D060" opacity="0.4"/>
    <rect x="51" y="102" width="18" height="2" rx="1" fill="#F0D060" opacity="0.4"/>

    <!-- Base platform -->
    <rect x="28" y="126" width="64" height="16" rx="4" fill="url(#trophyGold)" opacity="0.95"/>
    <!-- Base green stripe -->
    <rect x="31" y="128" width="58" height="12" rx="3" fill="#2d6e3a" opacity="0.8"/>
    <!-- FIFA text suggestion -->
    <rect x="38" y="131" width="44" height="3" rx="1" fill="#D4AF37" opacity="0.6"/>
    <rect x="44" y="136" width="32" height="2" rx="1" fill="#D4AF37" opacity="0.4"/>

    <!-- Second base -->
    <rect x="22" y="142" width="76" height="10" rx="4" fill="url(#trophyGold)" opacity="0.9"/>
  </g>

  <!-- "ROAD TO GLORY" main title -->
  <text x="600" y="296"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="86"
    font-weight="900"
    text-anchor="middle"
    fill="url(#goldTitle)"
    letter-spacing="6">ROAD TO GLORY</text>

  <!-- "2026" year -->
  <text x="600" y="378"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="64"
    font-weight="900"
    text-anchor="middle"
    fill="#D4AF37"
    letter-spacing="12"
    opacity="0.85">2026</text>

  <!-- Divider line -->
  <line x1="420" y1="408" x2="780" y2="408" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="440"
    font-family="Arial, sans-serif"
    font-size="22"
    font-weight="700"
    text-anchor="middle"
    fill="#D4AF37"
    letter-spacing="5"
    opacity="0.6">WORLD CUP PREDICTION BRACKET</text>

  <!-- Star decorations -->
  <text x="256" y="448" font-size="18" fill="#D4AF37" opacity="0.4" text-anchor="middle">★</text>
  <text x="944" y="448" font-size="18" fill="#D4AF37" opacity="0.4" text-anchor="middle">★</text>

  <!-- Bottom tagline -->
  <text x="600" y="500"
    font-family="Arial, sans-serif"
    font-size="16"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="3">Build your bracket · Share your glory</text>

  <!-- Corner accent lines -->
  <path d="M 120 104 L 120 80 L 144 80" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1080 104 L 1080 80 L 1056 80" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 120 526 L 120 550 L 144 550" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 1080 526 L 1080 550 L 1056 550" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
